<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Corazón de Amor</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #221526 0%, #0c0711 58%, #000 100%);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .contenedor {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 900px;
    }

    .oculto {
      opacity: 0;
      pointer-events: none;
    }

    .mostrar {
      opacity: 1;
      pointer-events: auto;
      transition: opacity 1.2s ease;
    }

    .pantalla-inicial {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #221526 0%, #0c0711 58%, #000 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 125px;
      z-index: 999;
      transition: opacity 1s ease, transform 1s ease;
    }

    .pantalla-inicial.desaparecer {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }

    .abrir-texto {
      color: #ffe6ee;
      font-size: clamp(32px, 5vw, 70px);
      font-weight: 400;
      text-shadow: 0 0 12px #ff75aa, 0 0 35px #ff4f8f;
    }

    .sobre {
      position: relative;
      width: 320px;
      height: 210px;
      cursor: pointer;
      filter: drop-shadow(0 0 25px #ff75aa);
      transition: transform .4s ease;
    }

    .solapa {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 50%;
      transform-origin: top;
      transition: transform 0.8s ease;
    }
    
    .sobre.abierto .solapa {
      transform: rotateX(180deg);
    }

    .sobre:hover {
      transform: scale(1.06);
    }

    .corazon-sobre {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      font-size: 58px;
      color: #ff2f4f;
      text-shadow: 0 0 10px #ff4f8f, 0 0 25px #ff75aa;
      animation: latidoSobre 1.3s ease-in-out infinite;
    }

    @keyframes latidoSobre {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.18); }
    }

    .titulo {
      position: absolute;
      top: 7%;
      color: #ffe6ee;
      font-size: clamp(28px, 4vw, 55px);
      letter-spacing: 2px;
      text-shadow: 0 0 12px #ff75aa, 0 0 35px #ff4f8f, 0 0 70px #ff2f7f;
      z-index: 10;
    }

    .corazon {
      position: relative;
      width: 640px;
      height: 560px;
      transform-style: preserve-3d;
      transform: rotateX(10deg);
      transition: transform 0.1s linear, filter 0.1s linear;
    }

    .texto {
      position: absolute;
      left: 50%;
      top: 50%;
      color: #ffd7e4;
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      transform-style: preserve-3d;
      text-shadow:
        0 0 5px #fff,
        0 0 12px #ff8aba,
        0 0 25px #ff4f96,
        0 0 45px #ff2f7f;
      opacity: 0;
      animation: avanzar 5s linear infinite;
    }

    .letra {
      position: absolute;
      bottom: 20%;
      width: 90%;
      text-align: center;
      color: #ffe6ee;
      font-size: clamp(20px, 3vw, 36px);
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px) scale(.98);
      text-shadow: 0 0 10px #ff75aa, 0 0 25px #ff4f8f;
      transition: all .6s ease;
      z-index: 20;
      white-space: pre-line;
    }

    .letra.activa {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes avanzar {
      0% { opacity: 0; transform: translate3d(var(--x1), var(--y1), -170px) scale(.72); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: translate3d(var(--x4), var(--y4), 150px) scale(1.1); }
    }
  </style>
</head>

<body>

  <main class="contenedor oculto" id="contenidoPrincipal">
    <h1 class="titulo">Quieres ser mi novia?</h1>
    <div class="corazon" id="corazon"></div>
    <div class="letra" id="letra"></div>
  </main>

  <section class="pantalla-inicial" id="pantallaInicial">
    <h1 class="abrir-texto">Abre el sobre</h1>

    <div class="sobre" id="sobre">

      <!-- BASE -->
      <svg viewBox="0 0 320 210">
        <rect x="0" y="0" width="320" height="210" rx="10"
          fill="transparent" stroke="#ffe6ee" stroke-width="4"/>
    
        <!-- líneas internas -->
        <path d="M0 0 L160 110 L320 0"
          fill="transparent" stroke="#ffe6ee" stroke-width="4"/>
      </svg>
    
      <!-- SOLAPA (la que se abre) -->
      <div class="solapa">
        <svg viewBox="0 0 320 110">
          <path d="M0 0 L160 110 L320 0"
            fill="transparent" stroke="#ffe6ee" stroke-width="4"/>
        </svg>
      </div>
    
      <div class="corazon-sobre">❤</div>
    </div>
  </section>

  <script>
    const corazon = document.getElementById("corazon");

    const cantidad = 52;
    const escala = 18.5;
    const textoBase = "I love you";

    function puntoCorazon(i){
      const t=(Math.PI*2*i)/cantidad;
      const x=16*Math.pow(Math.sin(t),3);
      const y=13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
      return {x:x*escala,y:-y*escala};
    }

    for(let i=0;i<cantidad;i++){
      const actual=puntoCorazon(i);
      const siguiente=puntoCorazon((i+1)%cantidad);
      const anterior=puntoCorazon((i-1+cantidad)%cantidad);
      const despues=puntoCorazon((i+2)%cantidad);

      const t=document.createElement("span");
      t.className="texto";
      t.textContent=textoBase;

      t.style.setProperty("--x1",`${anterior.x}px`);
      t.style.setProperty("--y1",`${anterior.y}px`);
      t.style.setProperty("--x4",`${despues.x}px`);
      t.style.setProperty("--y4",`${despues.y}px`);

      t.style.animationDelay=`${i*0.08}s`;
      corazon.appendChild(t);
    }
  </script>

  <audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <script>
    const audio = document.getElementById("musica");
    const corazonElemento = document.getElementById("corazon");
    const letraElemento = document.getElementById("letra");

    let contextoAudio, analizador, fuente, datos;
    let yaInicio = false;

    const letras = [
      { tiempo: 1.80, texto: "날 스치는 그대의 옅은 그 목소리\n(Nal seuchineun geudaeui yeoteun geu moksori)" },
      { tiempo: 7.90, texto: "내 이름을 한 번만 더 불러주세요\n(Nae ireumeul han beonman deo bulleojuseyo)" },
      { tiempo: 13, texto: "얼어버린 노을 아래 멈춰 서있지만\n(Eoreobeorin noeul arae meomchwo seoissjiman)" },
      { tiempo: 18, texto: "그대 향해 한 걸음씩 걸어갈래요\n(Geudae hyanghae han georeumssik georeogallaeyo)" },
      { tiempo: 23.5, texto: "Still with you" },
      { tiempo: 25.5, texto: "♪♪♪" },
      { tiempo: 27.5, texto: "" },

      { tiempo: 47, texto: "어두운 방, 조명 하나 없이\n(Eoduun bang, jomyeong hana eopsi)" },
      { tiempo: 52, texto: "익숙해지면 안 되는데\n(Iksukhaejimyeon an doeneunde)" },
      { tiempo: 54.3, texto: "그게 또 익숙해\n(Geuge tto iksukhae)" },
      { tiempo: 56.9, texto: "나지막이 들리는 이 에어컨 소리\n(Najimagi deullineun i eeokeon sori)" },
      { tiempo: 62, texto: "이거라도 없으면\n(Igeorado eopseumyeon)" },
      { tiempo: 64.5, texto: "나 정말 무너질 것 같아\n(Na jeongmal muneojil geot gata)" },

      { tiempo: 67.9, texto: "함께 웃고, 함께 울고\n(Hamkke utgo, hamkke ulgo)" },
      { tiempo: 73, texto: "이 단순한 감정들이\n(I dansunhan gamjeongdeuri)" },
      { tiempo: 75.3, texto: "내겐 전부였나 봐\n(Naegen jeonbuyeonna bwa)" },

      { tiempo: 79, texto: "언제쯤일까 다시 그댈 마주한다면?\n(Eonjejjyeumilkka dasi geudael majuhandamyeon?)" },
      { tiempo: 84, texto: "눈을 보고 말할래요\n(Nuneul bogo malhallaeyo)" },
      { tiempo: 87.4, texto: "보고 싶었어요\n(Bogo sipeosseoyo)" },

      { tiempo: 89, texto: "황홀했던 기억 속에\n(Hwangholhaetdeon gieok soge)" },
      { tiempo: 93, texto: "나 홀로 춤을 춰도 비가 내리잖아\n(Na hollo chumeul chwodo biga naerijana)" },
      { tiempo: 99, texto: "이 안개가 걷힐 때쯤\n(I angaega geothil ttaejjeum)" },
      { tiempo: 103.2, texto: "젖은 발로 달려갈 게\n(Jeojeun ballo dallyeogal ge)" },
      { tiempo: 107, texto: "그때 날 안아줘\n(Geuttae nal anajwo)" },
      { tiempo: 111, texto: "♪♪♪" },
      { tiempo: 113, texto: "" },

      { tiempo: 122, texto: "저 달이 외로워 보여서\n(Jeo dari oerowo boyeoseo)" },
      { tiempo: 128, texto: "밤하늘에 환하게 울고 있는 것 같아서\n(Bamhaneure hwanhage ulgo inneun geot gataseo)" },
      { tiempo: 133, texto: "언젠가 아침이 오는 걸 알면서도\n(Eonjenga achimi oneun geol almyeonseodo)" },
      { tiempo: 138, texto: "별처럼 너의 하늘에 머물고 싶었어 (아)\n(Byeolcheoreom neoui haneure meomulgo sipeosseo (ah))" },

      { tiempo: 144.7, texto: "하루를, 그 순간을\n(Harureul, geu sunganeul)" },
      { tiempo: 149.8, texto: "이렇게 될 걸 알았다면\n(Ireoke doel geol aratdamyeon)" },
      { tiempo: 151.5, texto: "더 담아뒀을 텐데\n(Deo damadwosseul tende)" },

      { tiempo: 155, texto: "언제쯤일까 다시 그댈 마주한다면?\n(Eonjejjyeumilkka dasi geudael majuhandamyeon?)" },
      { tiempo: 160, texto: "눈을 보고 말할래요\n(Nuneul bogo malhallaeyo)" },
      { tiempo: 163, texto: "보고 싶었어요\n(Bogo sipeosseoyo)" },

      { tiempo: 165, texto: "황홀했던 기억 속에\n(Hwangholhaetdeon gieok soge)" },
      { tiempo: 170, texto: "나 홀로 춤을 춰도 비가 내리잖아\n(Na hollo chumeul chwodo biga naerijana)" },
      { tiempo: 175, texto: "이 안개가 걷힐 때쯤\n(I angaega geothil ttaejjeum)" },
      { tiempo: 179, texto: "젖은 발로 달려갈 게\n(Jeojeun ballo dallyeogal ge)" },
      { tiempo: 183, texto: "그때 날 잡아줘\n(Geuttae nal jabajwo)" },

      { tiempo: 188, texto: "Ah-ah, ah-ah" },
      { tiempo: 190, texto: "Ah-ah, ah-ah" },
      { tiempo: 193, texto: "Ah-ah, mm, mm, mm" },
      { tiempo: 198, texto: "Ah-ah, ah-ah" },
      { tiempo: 204, texto: "Ah-ah, ah, ah-ah" },

      { tiempo: 209, texto: "날 바라보는 희미한 미소 뒤편에\n(Nal baraboneun huimihan miso dwipyeone)" },
      { tiempo: 215, texto: "아름다운 보랏빛을 그려볼래요\n(Areumdaun borasbicheul geuryeobollaeyo)" },
      { tiempo: 220, texto: "서로 발걸음이 안 맞을 수도 있지만\n(Seoro balgeoreumi an majeul sudo issjiman)" },
      { tiempo: 226, texto: "그대와 함께 이 길을 걷고 싶어요\n(Geudaewa hamkke i gireul geotgo sipeoyo)" },
      { tiempo: 231.5, texto: "Still with you" },
      { tiempo: 233.5, texto: "" }
    ];

    let indice = -1;

    const sobre = document.getElementById("sobre");

    sobre.addEventListener("click", async () => {
      if (yaInicio) return;
      yaInicio = true;
    
      // ✨ abrir sobre
      sobre.classList.add("abierto");
    
      // esperar animación
      setTimeout(async () => {
    
        document.getElementById("pantallaInicial").classList.add("desaparecer");
        document.getElementById("contenidoPrincipal").classList.remove("oculto");
        document.getElementById("contenidoPrincipal").classList.add("mostrar");
    
        audio.volume = 0;
    
        contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
        await contextoAudio.resume();
    
        analizador = contextoAudio.createAnalyser();
        fuente = contextoAudio.createMediaElementSource(audio);
    
        fuente.connect(analizador);
        analizador.connect(contextoAudio.destination);
    
        analizador.fftSize = 128;
        datos = new Uint8Array(analizador.frequencyBinCount);
    
        audio.play();
    
        let volumen = 0;
        const fade = setInterval(() => {
          if (volumen < 0.3) {
            volumen += 0.02;
            audio.volume = volumen;
          } else {
            clearInterval(fade);
          }
        }, 100);
    
        animarConMusica();
        actualizarLetra();
    
      }, 800); // ⏱ tiempo de la animación
    });

    function animarConMusica() {
      requestAnimationFrame(animarConMusica);

      analizador.getByteFrequencyData(datos);

      let suma = 0;
      for (let i = 0; i < datos.length; i++) suma += datos[i];

      const intensidad = (suma / datos.length) / 255;

      corazonElemento.style.transform = `rotateX(10deg) scale(${1 + intensidad * 0.12})`;
      corazonElemento.style.filter = `brightness(${1 + intensidad * 0.8})`;
    }

    function actualizarLetra(){
      requestAnimationFrame(actualizarLetra);

      const t = audio.currentTime;

      for(let i=letras.length-1;i>=0;i--){
        if(t >= letras[i].tiempo){
          if(indice !== i){
            indice = i;
            letraElemento.classList.remove("activa");

            setTimeout(()=>{
              letraElemento.textContent = letras[i].texto;
              letraElemento.classList.add("activa");
            },300);
          }
          break;
        }
      }
    }
  </script>

</body>
</html>
